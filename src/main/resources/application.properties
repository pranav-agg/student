spring.application.name=student-records-backend
server.port=${SERVER_PORT:5000}

# MySQL Connection Settings using Environment Variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Maximum number of simultaneous connections Hikari will keep in the pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}

# Minimum number of idle connections Hikari tries to maintain
spring.datasource.hikari.minimum-idle=${DB_POOL_MAX:2}

# Maximum time (in milliseconds) the app will wait for a connection from the pool before throwing an exception
spring.datasource.hikari.connection-timeout=30000

# Maximum amount of time a connection can sit idle before being retired
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime of a connection in the pool (prevents stale database connections)
spring.datasource.hikari.max-lifetime=1800000

# Enable the dedicated Kubernetes liveness and readiness health groups
management.endpoint.health.probes.enabled=true

# (Optional) Show full details of what is failing (useful for debugging)
management.endpoint.health.show-details=always